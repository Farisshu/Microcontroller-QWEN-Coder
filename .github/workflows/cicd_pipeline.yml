name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # Run weekly on Monday at 2 AM

jobs:
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov cppcheck clang-tidy
      
      - name: Run CI/CD Checker
        run: |
          chmod +x scripts/cicd_checker.py
          python scripts/cicd_checker.py -p . -o reports/cicd_check_result.json
      
      - name: Upload CI check results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cicd-check-results
          path: reports/cicd_check_result.json
          retention-days: 30
      
      - name: Generate Report
        run: |
          chmod +x scripts/generate_report.py
          python scripts/generate_report.py \
            -i reports/cicd_check_result.json \
            -o reports/ci_report.md \
            -f md \
            --show-summary
      
      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-reports
          path: |
            reports/*.md
            reports/*.html
            reports/*.json
          retention-days: 30
  
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run static analysis
        uses: cppcheck/cppcheck-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          command: cppcheck --enable=all --inconclusive --error-exitcode=1 src/
      
      - name: Check MISRA compliance indicators
        run: |
          echo "Running MISRA compliance checks..."
          python scripts/cicd_checker.py -p . --quiet
          echo "MISRA check completed"
  
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov unity cmake
      
      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ --cov=src --cov-report=xml --cov-report=html || echo "No Python tests found"
          else
            echo "No tests directory found"
          fi
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
  
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
      
      - name: Build project
        run: |
          if [ -f "Makefile" ]; then
            make clean && make all
          elif [ -f "CMakeLists.txt" ]; then
            mkdir -p build && cd build && cmake .. && make
          else
            echo "No build system found (Makefile or CMakeLists.txt)"
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware-build
          path: |
            build/*.elf
            build/*.bin
            build/*.hex
          retention-days: 7
  
  generate-final-report:
    name: Generate Final Report
    runs-on: ubuntu-latest
    needs: [ci-checks, code-quality, test, build]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Generate comprehensive report
        run: |
          python scripts/generate_report.py \
            -i data/example_report.json \
            -o reports/final_report.html \
            -f html
      
      - name: Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: reports/final_report.html
          retention-days: 30
  
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [generate-final-report]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.generate-final-report.result }}" == "success" ]; then
            echo "✅ All CI/CD checks passed successfully!"
          else
            echo "⚠️ Some CI/CD checks failed or were skipped"
            exit 1
          fi
